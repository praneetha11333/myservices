{% extends 'layout.html' %}
% {% block title %}
professional | signup
{% endblock %}
{% block content %}
<body>
    <div class="container  mt-5 ">
        <form action="/psignup" method="post" enctype="multipart/form-data">
            <h2 class="text-center mb-5">Service Professional Signup</h2>

            <div class="mb-3">
                <label for="inputEmail3" class="form-label">Email Id(Username) :</label>
                <input type="email" class="form-control" id="inputEmail3" name="email" required>
            </div>
            
            <div class=" mb-3">
                <label for="inputPassword3" class="form-label">Password :</label>
                <input type="password" class="form-control" id="inputPassword3" name="password" required>
            </div>

            <div class=" mb-3">
                <label for="name" class="form-label">FullName :</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="inputselect" class="form-label">Service Name :</label>
                <select id="inputselect" class="form-select" name="service" required>
                    <option selected>Select Avaliable Services</option>
                    {% for service in services %}
                    <option>{{ service.id }}</option>
                    {% endfor %}
                </select>    
            </div>

            <div class="mb-3">
                <label for="exp" class="form-label" >Experience in Years :</label>
                <input type="text" class="form-control" id="exp" name="experience" required>
            </div>


            <div class="mb-3">
                <label for="formFile" class="form-label">Attach Dcouments(single Pdf)</label>
                <input class="form-control" type="file" id="formFile" name="document" required >

            </div>

            <div class=" d-flex justify-content-between">
                <button type="submit"  class="btn btn-success">Register</button>
                <a href="{{url_for('home')}}" >Login Here</a>
            </div>
        </form>
    </div>
</body>
{% endblock %}
{% block style %}
<style>
    .container{
        display:flex;
        flex-direction:column;
        max-width:600px;    
    }
</style>  
{% endblock %}
