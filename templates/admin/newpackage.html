{% extends 'layout.html' %}

{% block title %}
    Admin | New Package
{% endblock %}

{% block content %}
<div class="container   mt-5 ">
    <form method="post" action="{{ url_for('new_package') }}" >

        <h3 class="text-center mb-5">New Package</h3>

        <div class="mb-4">
            <label for="service_name">Service Name</label>
            <input type="text" class="form-control" id="service_name" name="service" placeholder="Enter service name" required>
        </div>

        <div class=" mb-4">
            <label for="packname">Package Name</label>
            <input class="form-control" id="packname" name="name" rows="3" placeholder="Enter name of the package" required></input>
        </div>

        <div class=" mb-4">
            <label for="price">Base Price</label>
            <input type="text" class="form-control" id="price" name="base_price" placeholder="Enter base price" required>
        </div>

        <div class=" mb-4">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3" placeholder="Enter a brief description"></textarea>
        </div>

        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">Add Package</button>
            <a href="{{ url_for('a_home') }}" class="btn btn-secondary">Back</a>
        </div>

    </form>
</div>
{% endblock %}

{% block style %}
<style>
    .container{
        direction:flex
        flex-direction:column;
        max-width:500px;
    }

    h3{
        margin:30px;
        font-size: 30px;
        font-family:"Times New Roman", Times, serif;   
    }
</style>
{% endblock %}
